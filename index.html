<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status i Pogoda</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1e3a8a;
            margin-bottom: 10px;
        }
        .status {
            margin: 20px 0;
        }
        .status img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
        }
        .weather {
            margin: 30px 0 20px 0;
        }
        .weather h2 {
            color: #1e40af;
            margin-bottom: 15px;
        }
        .refresh-btn {
            padding: 12px 30px;
            font-size: 16px;
            background-color: #1e40af;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
        .refresh-btn:hover {
            background-color: #1e3a8a;
        }
        .last-refresh {
            font-size: 0.9em;
            color: #64748b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Status</h1>
    
    <div class="status">
        <img id="statusImg" src="status.png" alt="Status">
    </div>

    <div class="weather">
        <h2>Aktualna pogoda</h2>
        <a href="https://app.weathercloud.net/d9916512868" target="_blank">
            <img id="weatherImg" 
                 src="https://app.weathercloud.net/device/sticker/9916512868" 
                 alt="Pogoda - WeatherCloud">
        </a>
    </div>

    <button class="refresh-btn" onclick="refreshContent()">
        Odśwież dane
    </button>
    
    <div class="last-refresh" id="lastRefresh">Ostatnie odświeżenie: przed chwilą</div>
</div>

<script>
    function refreshContent() {
        const timestamp = new Date().getTime();
        
        // Odświeżenie obrazu status.png
        const statusImg = document.getElementById('statusImg');
        statusImg.src = `status.png?t=${timestamp}`;
        
        // Odświeżenie widgetu WeatherCloud
        const weatherImg = document.getElementById('weatherImg');
        weatherImg.src = `https://app.weathercloud.net/device/sticker/9916512868?t=${timestamp}`;
        
        // Aktualizacja informacji o ostatnim odświeżeniu
        const now = new Date();
        const timeString = now.toLocaleTimeString('pl-PL', { 
            hour: '2-digit', 
            minute: '2-digit',
            second: '2-digit'
        });
        document.getElementById('lastRefresh').textContent = `Ostatnie odświeżenie: ${timeString}`;
    }

    // Opcjonalnie: automatyczne odświeżanie co 5 minut
    setInterval(() => {
        refreshContent();
    }, 300000); // 300000 ms = 5 minut
</script>

</body>
</html>
